<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Browser</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --bg-deep:    #080d16;
      --bg-panel:   #0d1525;
      --bg-card:    #111c2e;
      --bg-input:   #0a1220;
      --border:     rgba(255,255,255,.07);
      --accent:     #e85d26;
      --accent-glo: rgba(232,93,38,.35);
      --accent2:    #2eaaff;
      --text:       #e8edf5;
      --muted:      #6b7a96;
      --radius:     10px;
      --font-head:  'Bebas Neue', sans-serif;
      --font-body:  'DM Sans', sans-serif;
    }

    /* ── Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient noise grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ───────────────────────────────────────────────── */
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,13,22,.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    #topbar h1 {
      font-family: var(--font-head);
      font-size: 2rem;
      letter-spacing: .05em;
      color: #fff;
      margin: 0;
    }

    #topbar .count-badge {
      font-size: .78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .03em;
    }

    /* ── Filter bar ────────────────────────────────────────────── */
    #filterbar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      position: sticky; top: 64px; z-index: 99;
    }

    .fbar-input {
      background: var(--bg-input) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      font-family: var(--font-body);
      font-size: .88rem;
    }
    .fbar-input:focus {
      box-shadow: 0 0 0 2px var(--accent-glo) !important;
      border-color: var(--accent) !important;
    }
    .fbar-input::placeholder { color: var(--muted) !important; }

    /* Search wrapper */
    .search-wrap { position: relative; flex: 1 1 220px; }
    .search-wrap .bi-search {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: .9rem;
    }
    .search-wrap input { padding-left: 34px !important; }

    /* Dropdowns */
    .dropdown-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius) !important;
      font-size: .88rem;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      padding: 7px 14px;
      min-width: 120px;
    }
    .dropdown-toggle:hover, .dropdown-toggle:focus, .dropdown-toggle:active,
    .show > .dropdown-toggle {
      background: var(--bg-card) !important;
      border-color: var(--accent) !important;
      color: var(--text) !important;
      box-shadow: none !important;
    }
    .dropdown-toggle::after { margin-left: auto; opacity: .5; }
    
    .dropdown-toggle:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .dropdown-menu {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      min-width: 200px;
    }

    /* Grid Layouts for Genres and Years to prevent scrolling */
    #genreMenu.show, #yearMenu.show {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 12px;
      width: 500px; /* Wide enough for 3 columns */
      max-height: none; /* See all without scrolling */
    }
    #genreMenu li:first-child {
      grid-column: 1 / -1; /* Make search span full width */
      margin-bottom: 6px;
    }

    @media (max-width: 600px) {
      #genreMenu.show, #yearMenu.show {
        grid-template-columns: repeat(2, 1fr);
        width: 320px;
        max-height: 450px;
        overflow-y: auto; /* Fallback scroll for mobile */
      }
    }

    .dropdown-menu .dropdown-item {
      color: var(--text);
      font-size: .86rem;
      border-radius: 6px;
      padding: 7px 10px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .dropdown-menu .dropdown-item:hover {
      background: rgba(232,93,38,.15);
      color: #fff;
    }
    .dropdown-menu .dropdown-item.active-item {
      background: rgba(232,93,38,.15);
      color: #fff;
    }

    .dropdown-menu .dropdown-item input[type=checkbox] {
      accent-color: var(--accent);
      width: 15px; height: 15px;
    }
    /* Genre search inside dropdown */
    .genre-search {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: .82rem;
      padding: 5px 10px;
      width: 100%;
      margin-bottom: 6px;
    }
    .genre-search:focus { outline: none; border-color: var(--accent); }
    .genre-search::placeholder { color: var(--muted); }

    /* Filter btn */
    #btnFilter {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 600;
      font-size: .88rem;
      border-radius: var(--radius) !important;
      padding: 8px 20px;
      display: flex; align-items: center; gap: 7px;
      transition: background .2s, transform .12s;
    }
    #btnFilter:hover { background: #f06030; transform: translateY(-1px); }
    #btnFilter:active { transform: translateY(0); }

    /* Source toggle */
    .source-tabs .btn {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .82rem;
      font-weight: 500;
      padding: 6px 14px;
    }
    .source-tabs .btn.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #000;
      font-weight: 700;
    }
    .source-tabs .btn:first-child { border-radius: 8px 0 0 8px; }
    .source-tabs .btn:last-child  { border-radius: 0 8px 8px 0; }

    /* Active filter pills */
    #activePills { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 24px 0; }
    .filter-pill {
      background: rgba(232,93,38,.18);
      border: 1px solid rgba(232,93,38,.35);
      color: var(--accent);
      font-size: .76rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer;
      transition: background .15s;
    }
    .filter-pill:hover { background: rgba(232,93,38,.3); }
    .filter-pill .pill-x { font-size: .7rem; opacity: .7; }

    /* ── Main grid ─────────────────────────────────────────────── */
    #main {
      padding: 24px;
      position: relative; z-index: 1;
    }

    #resultsInfo {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 18px;
    }

    /* ── Anime card ────────────────────────────────────────────── */
    .anime-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s, box-shadow .22s, border-color .22s;
      animation: fadeUp .35s ease both;
    }
    .anime-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,.5), 0 0 0 1px var(--accent);
      border-color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #0a1828;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .35s;
    }
    .anime-card:hover .card-img-wrap img { transform: scale(1.07); }

    .card-score {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 700;
      padding: 3px 7px;
      color: #ffd166;
      display: flex; align-items: center; gap: 3px;
    }

    .card-type-badge {
      position: absolute; top: 8px; right: 8px;
      background: var(--accent);
      border-radius: 5px;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #fff;
    }

    .card-body {
      padding: 10px 12px 12px;
    }
    .card-title {
      font-size: .85rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: .74rem;
      color: var(--muted);
      display: flex; justify-content: space-between;
    }

    .card-genres {
      margin-top: 6px;
      display: flex; flex-wrap: wrap; gap: 3px;
    }
    .genre-tag {
      background: rgba(46,170,255,.1);
      border: 1px solid rgba(46,170,255,.2);
      color: var(--accent2);
      font-size: .65rem;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* No image placeholder */
    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d1525, #111c2e);
      color: var(--muted);
      font-size: 2rem;
    }

    /* ── Skeleton loader ───────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, #162035 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
      overflow: hidden;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-img  { aspect-ratio: 2/3; }
    .skeleton-text { height: 12px; margin: 10px 12px 4px; border-radius: 4px; }
    .skeleton-text.short { width: 60%; }

    /* ── Pagination ────────────────────────────────────────────── */
    #pagination {
      padding: 28px 24px;
      display: flex; justify-content: center; gap: 6px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .page-btn:disabled {
      opacity: .3; cursor: not-allowed;
    }

    /* ── Modal ─────────────────────────────────────────────────── */
    #detailModal .modal-content {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
    }
    #detailModal .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }
    #detailModal .modal-header .btn-close {
      filter: invert(1) brightness(.7);
    }
    #detailModal .modal-body { padding: 0; }

    .detail-banner {
      width: 100%; height: 200px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }
    .detail-banner-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #0d2040, #1a0d30);
      border-radius: 16px 16px 0 0;
    }
    .detail-inner { padding: 20px 24px 24px; }

    .detail-cover {
      width: 100px; height: 145px;
      object-fit: cover;
      border-radius: 8px;
      border: 3px solid var(--bg-panel);
      margin-top: -60px;
      position: relative; z-index: 2;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }

    .detail-title {
      font-family: var(--font-head);
      font-size: 1.8rem;
      letter-spacing: .03em;
      line-height: 1.2;
      margin: 10px 0 4px;
    }
    .detail-sub { font-size: .85rem; color: var(--muted); margin-bottom: 12px; }

    .detail-stats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .stat-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: .82rem;
      display: flex; align-items: center; gap: 5px;
    }
    .stat-chip .label { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; }

    .detail-desc {
      font-size: .87rem;
      line-height: 1.65;
      color: #bac6d8;
      margin-bottom: 16px;
    }

    .ext-link {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .82rem;
      border-radius: 8px;
      padding: 6px 14px;
      text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .ext-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Empty / error states ──────────────────────────────────── */
    #emptyState {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    #emptyState .icon { font-size: 3.5rem; margin-bottom: 16px; opacity: .4; }
    #emptyState h4 { font-family: var(--font-head); font-size: 1.5rem; letter-spacing: .04em; color: var(--text); }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #topbar h1 { font-size: 1.5rem; }
      #main { padding: 16px; }
      #filterbar { padding: 10px 16px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

<input type="file" id="xmlUpload" accept=".xml" style="display:none;" />

<div id="topbar" class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
  <div class="d-flex align-items-center gap-3">
    <h1>BROWSER</h1>
    <span class="count-badge" id="countBadge">— anime</span>
    
    <div id="myListControls" style="display:none; align-items: center; gap: 8px;">
      <input type="text" id="malUsername" class="form-control fbar-input" placeholder="MAL Username" style="width: 130px; font-size: .8rem; padding: 2px 8px; border-radius: 6px; height: 28px;" />
      <button id="btnImportUsername" class="btn btn-sm btn-outline-info" style="font-size:.75rem; padding: 2px 8px; border-radius: 6px; height: 28px;">
        Fetch
      </button>
      <span style="color:var(--muted); font-size:.75rem;">or</span>
      <button id="btnUploadXml" class="btn btn-sm btn-outline-secondary" style="font-size:.75rem; padding: 2px 8px; border-radius: 6px; height: 28px;">
        <i class="bi bi-upload"></i> XML
      </button>
      <button id="btnClearList" class="btn btn-sm btn-outline-danger" style="display:none; font-size:.75rem; padding: 2px 8px; border-radius: 6px; height: 28px;">
        <i class="bi bi-trash"></i> Clear
      </button>
    </div>
  </div>
  <div class="source-tabs btn-group" role="group">
    <button class="btn active" data-source="anilist">AniList</button>
    <button class="btn" data-source="mal">MyAnimeList</button>
    <button class="btn" data-source="mylist">My List <i class="bi bi-person-lines-fill"></i></button>
  </div>
</div>

<div id="filterbar">

  <div class="search-wrap">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" class="form-control fbar-input" placeholder="Search…" />
  </div>

  <div class="dropdown">
    <button class="btn dropdown-toggle" id="typeToggle" data-bs-toggle="dropdown">
      <i class="bi bi-collection-play"></i> Type
    </button>
    <ul class="dropdown-menu" id="typeMenu">
      <li><span class="dropdown-item active-item" data-value="">All Types</span></li>
      <li><span class="dropdown-item" data-value="tv">TV</span></li>
      <li><span class="dropdown-item" data-value="movie">Movie</span></li>
      <li><span class="dropdown-item" data-value="ova">OVA</span></li>
      <li><span class="dropdown-item" data-value="ona">ONA</span></li>
      <li><span class="dropdown-item" data-value="special">Special</span></li>
      <li><span class="dropdown-item" data-value="music">Music</span></li>
    </ul>
  </div>

  <div class="dropdown">
    <button class="btn dropdown-toggle" id="genreToggle" data-bs-toggle="dropdown" data-bs-auto-close="outside">
      <i class="bi bi-tags"></i> Genre <span id="genreCount" class="ms-1 text-accent" style="color:var(--accent);font-weight:700;"></span>
    </button>
    <ul class="dropdown-menu" id="genreMenu" style="min-width:230px;">
      <li class="px-2 pb-1">
        <input type="text" class="genre-search" id="genreSearch" placeholder="Search genres…" />
      </li>
      </ul>
  </div>

  <div class="dropdown">
    <button class="btn dropdown-toggle" id="yearToggle" data-bs-toggle="dropdown" data-bs-auto-close="outside">
      <i class="bi bi-calendar3"></i> Year <span id="yearCount" class="ms-1" style="color:var(--accent);font-weight:700;"></span>
    </button>
    <ul class="dropdown-menu" id="yearMenu">
      </ul>
  </div>

  <div class="dropdown">
    <button class="btn dropdown-toggle" id="statusToggle" data-bs-toggle="dropdown">
      <i class="bi bi-broadcast"></i> Status
    </button>
    <ul class="dropdown-menu" id="statusMenu">
      </ul>
  </div>

  <div class="dropdown">
    <button class="btn dropdown-toggle" id="sortToggle" data-bs-toggle="dropdown">
      <i class="bi bi-sort-down"></i> Sort
    </button>
    <ul class="dropdown-menu" id="sortMenu">
      <li><span class="dropdown-item active-item" data-value="score_desc">Score ↓</span></li>
      <li><span class="dropdown-item" data-value="score_asc">Score ↑</span></li>
      <li><span class="dropdown-item" data-value="date_desc">Newest first</span></li>
      <li><span class="dropdown-item" data-value="date_asc">Oldest first</span></li>
    </ul>
  </div>

  <button id="btnFilter">
    <i class="bi bi-sliders2"></i> Filter
  </button>
  
  <button id="btnHideMyList" class="btn align-items-center gap-2" style="display:none; background: var(--bg-input); border: 1px solid var(--border); color: var(--muted); font-size:.85rem; padding: 7px 14px; border-radius: var(--radius);">
    <i class="bi bi-eye-slash"></i> <span>Hide My Anime</span>
  </button>
</div>

<div id="activePills"></div>

<div id="main">
  <div id="resultsInfo"></div>
  <div id="grid"></div>
  <div id="emptyState" style="display:none">
    <div class="icon">🎌</div>
    <h4>No anime found</h4>
    <p>Try different filters, search terms, or importing your list.</p>
  </div>
  <div id="pagination"></div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? '' // use Deno backend
  : ''; // same origin

const GENRES = [
  "Action","Adventure","Avant Garde","Boys Love","Comedy","Demons","Drama",
  "Ecchi","Fantasy","Girls Love","Gourmet","Harem","Horror","Isekai","Iyashikei",
  "Josei","Kids","Magic","Mahou Shoujo","Martial Arts","Mecha","Military",
  "Music","Mystery","Parody","Psychological","Reincarnation","Reverse Harem","Romance","School",
  "Sci-Fi","Seinen","Shoujo","Shounen","Slice of Life","Space","Sports",
  "Super Power","Supernatural","Suspense","Thriller","Vampire"
];

// Load local anime list from memory if it exists
let myAnimeList = JSON.parse(localStorage.getItem('myAnimeList') || '[]');

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  source:   'anilist', // 'anilist' | 'mal' | 'mylist'
  q:        '',
  type:     '',
  genresIn: [], 
  genresEx: [], 
  years:    [], 
  status:   '',
  sort:     'score_desc',
  page:     1,
  perPage:  24,
  total:    0,
  lastPage: 1,
  hideMyList: false, // Tracks if user's list is hidden from global search
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const $grid       = document.getElementById('grid');
const $empty      = document.getElementById('emptyState');
const $count      = document.getElementById('countBadge');
const $info       = document.getElementById('resultsInfo');
const $pagination = document.getElementById('pagination');
const $pills      = document.getElementById('activePills');
const $search     = document.getElementById('searchInput');
const $genreMenu  = document.getElementById('genreMenu');
const $genreSearch= document.getElementById('genreSearch');
const $genreCount = document.getElementById('genreCount');
const $yearMenu   = document.getElementById('yearMenu');
const $yearCount  = document.getElementById('yearCount');
let   detailModal;

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
  
  // Pre-fill saved username if it exists
  const savedUsername = localStorage.getItem('malUsername');
  if (savedUsername) {
    document.getElementById('malUsername').value = savedUsername;
  }

  buildGenreMenu();
  buildYearMenu();
  updateStatusDropdown();
  updateTabUI(); // Set the initial button visibility
  bindEvents();
  fetchAnime();
});

// ── Tab UI Updates ─────────────────────────────────────────────────────────
function updateTabUI() {
  const isMyList = state.source === 'mylist';
  const hasItems = myAnimeList && myAnimeList.length > 0;
  
  document.getElementById('myListControls').style.display = isMyList ? 'flex' : 'none';
  document.getElementById('btnClearList').style.display = hasItems ? 'inline-block' : 'none';
  
  // Show "Hide My Anime" only on AniList or MAL tabs when user has an imported list
  document.getElementById('btnHideMyList').style.display = (!isMyList && hasItems) ? 'inline-flex' : 'none';
}

// ── Dynamic Status Menu ────────────────────────────────────────────────────
function updateStatusDropdown() {
  const menu = document.getElementById('statusMenu');
  menu.innerHTML = '';
  
  // Swap options depending on if the user is looking at the global databases or their own list
  const map = state.source === 'mylist' 
    ? [ { val: '', label: 'All' }, { val: 'Completed', label: 'Completed' }, { val: 'Plan to Watch', label: 'Plan to Watch' }, { val: 'Watching', label: 'Watching' }, { val: 'On-Hold', label: 'On-Hold' }, { val: 'Dropped', label: 'Dropped' } ]
    : [ { val: '', label: 'All' }, { val: 'airing', label: 'Airing' }, { val: 'complete', label: 'Completed' }, { val: 'upcoming', label: 'Upcoming' } ];
  
  map.forEach(s => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="dropdown-item ${state.status === s.val ? 'active-item' : ''}" data-value="${s.val}">${s.label}</span>`;
    li.querySelector('span').addEventListener('click', (e) => {
      document.querySelectorAll('#statusMenu .dropdown-item').forEach(i => i.classList.remove('active-item'));
      e.target.classList.add('active-item');
      state.status = s.val;
      document.getElementById('statusToggle').innerHTML = `<i class="bi bi-broadcast"></i> ${s.label === 'All' ? 'Status' : s.label}`;
      state.page = 1;
      fetchAnime();
    });
    menu.appendChild(li);
  });
  
  const currentLabel = map.find(x => x.val === state.status)?.label || 'Status';
  document.getElementById('statusToggle').innerHTML = `<i class="bi bi-broadcast"></i> ${currentLabel === 'All' ? 'Status' : currentLabel}`;
}

// ── Year menu ──────────────────────────────────────────────────────────────
const YEARS = Array.from({length: 27}, (_, i) => (2026 - i).toString())
              .concat(Array.from({length: 10}, (_, i) => (1990 - i * 10) + 's'));

function buildYearMenu() {
  $yearMenu.innerHTML = '';
  YEARS.forEach(y => {
    const li = document.createElement('li');
    const active = state.years.includes(y);
    li.innerHTML = `
      <label class="dropdown-item ${active ? 'active-item' : ''}">
        <input type="checkbox" ${active ? 'checked' : ''} style="accent-color:var(--accent); width:15px; height:15px;" value="${y}" />
        ${y}
      </label>`;
    li.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) {
        if (!state.years.includes(y)) state.years.push(y);
      } else {
        state.years = state.years.filter(x => x !== y);
      }
      $yearCount.textContent = state.years.length ? `(${state.years.length})` : '';
      buildYearMenu();
    });
    $yearMenu.appendChild(li);
  });
}

// ── Genre menu ─────────────────────────────────────────────────────────────
function buildGenreMenu(filter = '') {
  // Remove all genre items without destroying the search input element to preserve typing focus
  while ($genreMenu.children.length > 1) {
    $genreMenu.removeChild($genreMenu.lastChild);
  }

  const lower = filter.toLowerCase();
  const shown = GENRES.filter(g => g.toLowerCase().includes(lower));

  shown.forEach(g => {
    const inActive = state.genresIn.includes(g);
    const exActive = state.genresEx.includes(g);
    
    let icon = '<i class="bi bi-square text-muted"></i>';
    if (inActive) icon = '<i class="bi bi-check-square-fill" style="color:var(--accent2)"></i>';
    if (exActive) icon = '<i class="bi bi-x-square-fill text-danger"></i>';

    const li = document.createElement('li');
    li.innerHTML = `
      <div class="dropdown-item ${inActive || exActive ? 'active-item' : ''}">
        ${icon} <span style="${exActive ? 'text-decoration:line-through;opacity:0.6' : ''}">${g}</span>
      </div>`;
      
    li.addEventListener('click', (e) => {
      e.stopPropagation(); 
      if (inActive) {
        state.genresIn = state.genresIn.filter(x => x !== g);
        state.genresEx.push(g);
      } else if (exActive) {
        state.genresEx = state.genresEx.filter(x => x !== g);
      } else {
        state.genresIn.push(g);
      }
      
      const total = state.genresIn.length + state.genresEx.length;
      $genreCount.textContent = total ? `(${total})` : '';
      
      // Clear the search bar and rebuild the full menu list when an item is selected
      $genreSearch.value = '';
      buildGenreMenu('');
    });
    
    $genreMenu.appendChild(li);
  });
}

$genreSearch.addEventListener('input', e => buildGenreMenu(e.target.value));

// ── Fetch List via Username (NEW) ──────────────────────────────────────────
document.getElementById('btnImportUsername').addEventListener('click', async () => {
  const username = document.getElementById('malUsername').value.trim();
  if (!username) {
    alert("Please enter a MyAnimeList username.");
    return;
  }
  
  const btn = document.getElementById('btnImportUsername');
  const originalText = btn.innerHTML;
  btn.innerHTML = '<i class="bi bi-hourglass-split"></i>';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/import-mal?username=${encodeURIComponent(username)}`);
    const data = await res.json();
    
    if (data.error || !Array.isArray(data)) {
      throw new Error(data.error || "Failed to fetch list. The profile might be private.");
    }

    if (data.length === 0) {
      alert("No anime found for this user. Make sure the username is correct and their list is public.");
      return;
    }

    const parseMalStatus = (statusInt) => {
      switch(statusInt) {
        case 1: return "Watching";
        case 2: return "Completed";
        case 3: return "On-Hold";
        case 4: return "Dropped";
        case 6: return "Plan to Watch";
        default: return "Unknown";
      }
    };

    myAnimeList = data.map(item => ({
      id: String(item.anime_id),
      title: item.anime_title,
      type: item.anime_media_type_string || '',
      episodes: String(item.anime_num_episodes),
      watched: String(item.num_watched_episodes),
      my_score: item.score,
      my_status: parseMalStatus(item.status),
      // Clean up MAL's thumbnail modifier parameter so we get the best resolution possible
      image: item.anime_image_path ? item.anime_image_path.replace(/\/r\/\d+x\d+\//, '/') : '' 
    }));

    // Save the list and the username in localStorage!
    localStorage.setItem('myAnimeList', JSON.stringify(myAnimeList));
    localStorage.setItem('malUsername', username);
    
    alert(`Successfully imported ${myAnimeList.length} anime from ${username}'s list!`);
    
    updateTabUI();
    
    if (state.source === 'mylist') {
      state.page = 1;
      fetchAnime();
    }
  } catch (err) {
    alert("Error fetching user list: " + err.message);
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
});

// ── XML Upload & Clear Data ────────────────────────────────────────────────
document.getElementById('btnUploadXml').addEventListener('click', () => {
  document.getElementById('xmlUpload').click();
});

document.getElementById('btnClearList').addEventListener('click', () => {
  if (confirm("Are you sure you want to completely clear your imported anime list?")) {
    localStorage.removeItem('myAnimeList');
    myAnimeList = [];
    updateTabUI();
    if (state.source === 'mylist') {
      state.page = 1;
      fetchAnime();
    }
  }
});

document.getElementById('xmlUpload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const text = ev.target.result;
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(text, "text/xml");
      const animes = xmlDoc.querySelectorAll("anime");
      
      if (animes.length === 0) {
          alert("Could not find any anime in the XML. Make sure it's a valid MyAnimeList export.");
          return;
      }

      myAnimeList = Array.from(animes).map(node => ({
        id: node.querySelector("series_animedb_id")?.textContent || '',
        title: node.querySelector("series_title")?.textContent || 'Unknown',
        type: node.querySelector("series_type")?.textContent || '',
        episodes: node.querySelector("series_episodes")?.textContent || '0',
        watched: node.querySelector("my_watched_episodes")?.textContent || '0',
        my_score: parseInt(node.querySelector("my_score")?.textContent || "0"),
        my_status: node.querySelector("my_status")?.textContent || '',
        image: node.querySelector("series_image")?.textContent || ''
      }));

      localStorage.setItem('myAnimeList', JSON.stringify(myAnimeList));
      alert(`Successfully imported ${myAnimeList.length} anime!`);
      
      updateTabUI(); // Show the clear/hide buttons

      if (state.source === 'mylist') {
        state.page = 1;
        fetchAnime();
      }
    } catch (err) {
      alert("Error parsing XML: " + err);
    }
  };
  reader.readAsText(file);
});

// ── Events ─────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.source-tabs .btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.source-tabs .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.source = btn.dataset.source;
      state.page = 1;
      
      state.status = '';
      updateStatusDropdown();
      updateTabUI();
      
      fetchAnime();
    });
  });

  document.querySelectorAll('#typeMenu .dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#typeMenu .dropdown-item').forEach(i => i.classList.remove('active-item'));
      item.classList.add('active-item');
      state.type = item.dataset.value;
      document.getElementById('typeToggle').innerHTML = `<i class="bi bi-collection-play"></i> ${state.type ? capitalise(state.type) : 'Type'}`;
      state.page = 1;
    });
  });

  document.querySelectorAll('#sortMenu .dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#sortMenu .dropdown-item').forEach(i => i.classList.remove('active-item'));
      item.classList.add('active-item');
      state.sort = item.dataset.value;
      document.getElementById('sortToggle').innerHTML = `<i class="bi bi-sort-down"></i> ${item.textContent.trim()}`;
      state.page = 1;
    });
  });

  document.getElementById('btnFilter').addEventListener('click', () => { state.q = $search.value.trim(); state.page = 1; fetchAnime(); });
  $search.addEventListener('keydown', e => { if (e.key === 'Enter') { state.q = $search.value.trim(); state.page = 1; fetchAnime(); } });

  document.getElementById('btnHideMyList').addEventListener('click', (e) => {
    state.hideMyList = !state.hideMyList;
    const btn = e.currentTarget;
    if (state.hideMyList) {
      btn.style.background = 'rgba(232,93,38,.15)';
      btn.style.color = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
      btn.innerHTML = '<i class="bi bi-eye-slash-fill"></i> <span>Hiding My Anime</span>';
    } else {
      btn.style.background = 'var(--bg-input)';
      btn.style.color = 'var(--muted)';
      btn.style.borderColor = 'var(--border)';
      btn.innerHTML = '<i class="bi bi-eye-slash"></i> <span>Hide My Anime</span>';
    }
    state.page = 1;
    fetchAnime();
  });
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchAnime() {
  renderSkeletons();
  renderPills();

  const paramsObj = {
    q:      state.q,
    type:   state.type,
    genres: state.genresIn.join(','),
    genres_exclude: state.genresEx.join(','),
    years:  state.years.join(','),
    sort:   state.sort,
    page:   state.page,
    limit:  state.perPage,
  };

  try {
    let res;
    let newTotal = 0;
    let newLastPage = 1;
    let itemsToRender = [];

    // --- LOCAL LIST VIA ANILIST BRIDGE ---
    if (state.source === 'mylist') {
      if (!myAnimeList || myAnimeList.length === 0) { showEmpty(); return; }

      // Filter locally by user's personal XML status first
      let targetList = myAnimeList;
      if (state.status) {
        targetList = targetList.filter(a => a.my_status === state.status);
      }

      if (targetList.length === 0) { showEmpty(); return; }

      // Grab the MAL IDs to pass to the backend
      const ids = targetList.map(a => a.id).join(',');
      const pString = new URLSearchParams(paramsObj).toString();

      // Use POST because a massive list of IDs can exceed URL length limits
      res = await fetch(`${API_BASE}/api/anilist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ params: pString, ids: ids })
      });
      
      const data = await res.json();
      const page = data?.data?.Page;
      if (!page) throw new Error(JSON.stringify(data));

      newTotal = page.pageInfo?.total ?? 0;
      newLastPage = page.pageInfo?.lastPage ?? 1;
      itemsToRender = page.media ?? [];

    // --- STANDARD API ---
    } else {
      paramsObj.status = state.status; // Global status 
      const pString = new URLSearchParams(paramsObj).toString();

      // IF USER WANTS TO HIDE THEIR ANIME LIST
      if (state.hideMyList && myAnimeList.length > 0) {
        const myIds = myAnimeList.map(a => a.id).join(',');
        
        if (state.source === 'anilist') {
          res = await fetch(`${API_BASE}/api/anilist`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ params: pString, exclude_ids: myIds })
          });
          const data = await res.json();
          const page = data?.data?.Page;
          if (!page) throw new Error(JSON.stringify(data));
          newTotal    = page.pageInfo?.total    ?? 0;
          newLastPage = page.pageInfo?.lastPage ?? 1;
          itemsToRender = page.media ?? [];
        } else {
          res = await fetch(`${API_BASE}/api/mal?${pString}`);
          const data = await res.json();
          newTotal    = data?.pagination?.items?.total ?? 0;
          newLastPage = data?.pagination?.last_visible_page ?? 1;
          
          const myIdSet = new Set(myAnimeList.map(a => parseInt(a.id)));
          itemsToRender = (data?.data ?? []).filter(a => !myIdSet.has(a.mal_id));
        }

      // IF FETCHING NORMALLY
      } else {
        const endpoint = state.source === 'anilist' ? '/api/anilist' : '/api/mal';
        res = await fetch(`${API_BASE}${endpoint}?${pString}`);
        const data = await res.json();

        if (state.source === 'anilist') {
          const page = data?.data?.Page;
          if (!page) throw new Error(JSON.stringify(data));
          newTotal    = page.pageInfo?.total    ?? 0;
          newLastPage = page.pageInfo?.lastPage ?? 1;
          itemsToRender = page.media ?? [];
        } else {
          newTotal    = data?.pagination?.items?.total ?? 0;
          newLastPage = data?.pagination?.last_visible_page ?? 1;
          itemsToRender = data?.data ?? [];
        }
      }
    }

    // Freeze the total counts when you click past Page 1.
    if (state.page === 1) {
      state.total = newTotal;
      state.lastPage = newLastPage;
    }

    // Render Data
    if (state.source === 'mylist') {
      renderMyList(itemsToRender);
    } else if (state.source === 'anilist') {
      renderAniList(itemsToRender);
    } else {
      renderMAL(itemsToRender);
    }

    $count.textContent = `${state.total.toLocaleString()} anime`;
    $info.textContent  = `Page ${state.page} of ${state.lastPage} · ${state.total.toLocaleString()} results`;
    renderPagination();
  } catch (err) {
    showError(err);
  }
}

// ── Render: My List (Hybrid Global Data + Local Status) ────────────────────
function renderMyList(items) {
  if (!items.length) { showEmpty(); return; }
  $empty.style.display = 'none';
  $grid.innerHTML = '';

  items.forEach((a, i) => {
    // Find the corresponding local XML data
    const localData = myAnimeList.find(x => parseInt(x.id) === a.idMal);

    const title  = a.title?.english || a.title?.romaji || 'Unknown';
    const img    = a.coverImage?.large || a.coverImage?.medium || '';
    // Display the global score! (Ignoring local XML score)
    const globalScore = a.averageScore ? (a.averageScore / 10).toFixed(1) : '—'; 
    const type   = a.format ?? '';
    const status = localData ? localData.my_status : '';
    const watched = localData ? localData.watched : '0';
    const totalEp = a.episodes || '?';
    const genres = (a.genres ?? []).slice(0, 3); // Grab up to 3 genres

    const card = document.createElement('div');
    card.className = 'anime-card';
    card.style.animationDelay = `${i * 0.03}s`;
    card.innerHTML = `
      <div class="card-img-wrap">
        ${img
          ? `<img src="${img}" alt="${escHtml(title)}" loading="lazy" />`
          : `<div class="img-placeholder"><i class="bi bi-film"></i></div>`}
        ${globalScore !== '—' ? `<div class="card-score"><i class="bi bi-star-fill" style="font-size:.65rem;color:#ffd166"></i>${globalScore}</div>` : ''}
        ${type ? `<div class="card-type-badge">${type}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${getStatusIcon(a.status)}${escHtml(title)}</div>
        <div class="card-meta"><span style="color:var(--accent2);font-weight:600;">${status}</span> <span>${watched} / ${totalEp} ep</span></div>
        <div class="card-genres">${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>
      </div>`;
      
    // Re-use AniList modal, but pass local data to display personal status
    card.addEventListener('click', () => openDetailAniList(a, localData)); 
    $grid.appendChild(card);
  });
}

// ── Detail modals ──────────────────────────────────────────────────────────
function openDetailAniList(a, localData = null) {
  const title   = a.title?.english || a.title?.romaji || 'Unknown';
  const native  = a.title?.native  || '';
  const score   = a.averageScore ? (a.averageScore / 10).toFixed(1) : '—';
  const banner  = a.bannerImage   || '';
  const cover   = a.coverImage?.large || '';
  const desc    = (a.description || 'No description available.').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
  const start   = a.startDate ? `${a.startDate.year || ''}` : '—';
  const studios = (a.studios?.nodes ?? []).map(s => s.name).join(', ') || '—';
  const genres  = (a.genres ?? []);

  const anilistUrl = a.siteUrl || '';
  const malUrl = a.idMal ? `https://myanimelist.net/anime/${a.idMal}` : '';

  document.getElementById('modalBody').innerHTML = buildDetailHTML({
    banner, cover, title, native, score,
    type: a.format, 
    status: localData ? localData.my_status : a.status, // Override global status with personal status if available
    episodes: localData ? `${localData.watched} / ${a.episodes || '?'}` : a.episodes,
    year: start, studios,
    genres, desc, anilistUrl, malUrl
  });
  detailModal.show();
}

function openDetailMAL(a) {
  const title  = a.title_english || a.title || 'Unknown';
  const native = a.title_japanese || '';
  const score  = a.score ? Number(a.score).toFixed(1) : '—';
  const banner = a.images?.jpg?.large_image_url || '';
  const cover  = a.images?.jpg?.large_image_url || '';
  const desc   = a.synopsis || 'No description available.';
  const year   = a.aired?.prop?.from?.year ?? '—';
  const studios= (a.studios ?? []).map(s => s.name).join(', ') || '—';
  const genres = (a.genres ?? []).map(g => g.name);

  const malUrl = a.url || '';
  const anilistUrl = `https://anilist.co/search/anime?search=${encodeURIComponent(title)}`;

  document.getElementById('modalBody').innerHTML = buildDetailHTML({
    banner, cover, title, native, score,
    type: a.type, status: a.status,
    episodes: a.episodes, year, studios,
    genres, desc, anilistUrl, malUrl
  });
  detailModal.show();
}

function buildDetailHTML({ banner, cover, title, native, score, type, status,
    episodes, year, studios, genres, desc, anilistUrl, malUrl }) {
  return `
    ${banner
      ? `<img src="${banner}" class="detail-banner" alt="" />`
      : `<div class="detail-banner-placeholder"></div>`}
    <div class="detail-inner">
      <div class="d-flex gap-3 align-items-flex-start">
        ${cover ? `<img src="${cover}" class="detail-cover" alt="" />` : ''}
        <div class="flex-grow-1 pt-2">
          <h2 class="detail-title">${escHtml(title)}</h2>
          ${native ? `<div class="detail-sub">${escHtml(native)}</div>` : ''}
        </div>
      </div>
      <div class="detail-stats mt-3">
        ${score !== '—' ? statChip('⭐', 'Score', score) : ''}
        ${type   ? statChip('📺', 'Type',     capitalise(type))     : ''}
        ${status ? statChip('📡', 'Status',   capitalise(status))   : ''}
        ${episodes ? statChip('🎬', 'Episodes', episodes)           : ''}
        ${year !== '—' ? statChip('📅', 'Year', year)               : ''}
        ${studios !== '—' ? statChip('🏢', 'Studio', studios)       : ''}
      </div>
      ${genres.length ? `<div class="card-genres mb-3">${genres.map(g=>`<span class="genre-tag">${g}</span>`).join('')}</div>` : ''}
      <p class="detail-desc">${escHtml(desc).replace(/\n/g,'<br/>')}</p>
      <div class="d-flex gap-2 flex-wrap">
        ${anilistUrl ? `<a href="${anilistUrl}" target="_blank" rel="noopener" class="ext-link" style="color: #02A9FF; border-color: rgba(2,169,255,0.3);"><i class="bi bi-box-arrow-up-right"></i> AniList</a>` : ''}
        ${malUrl ? `<a href="${malUrl}" target="_blank" rel="noopener" class="ext-link" style="color: #2E51A2; border-color: rgba(46,81,162,0.3);"><i class="bi bi-box-arrow-up-right"></i> MyAnimeList</a>` : ''}
      </div>
    </div>`;
}

function statChip(icon, label, val) {
  return `<div class="stat-chip"><span>${icon}</span><div><div class="label">${label}</div><div>${val}</div></div></div>`;
}

// ── Pagination ─────────────────────────────────────────────────────────────
function renderPagination() {
  $pagination.innerHTML = '';
  const { page, lastPage } = state;
  if (lastPage <= 1) return;

  const pages = paginationPages(page, lastPage);

  // Prev
  const prev = pageBtn('‹', page === 1, () => { state.page--; fetchAnime(); });
  $pagination.appendChild(prev);

  pages.forEach(p => {
    if (p === '…') {
      const el = document.createElement('span');
      el.className = 'page-btn'; el.textContent = '…'; el.style.cursor = 'default';
      $pagination.appendChild(el);
    } else {
      const el = pageBtn(p, false, () => { state.page = p; fetchAnime(); });
      if (p === page) el.classList.add('active');
      $pagination.appendChild(el);
    }
  });

  // Next
  const next = pageBtn('›', page >= lastPage, () => { state.page++; fetchAnime(); });
  $pagination.appendChild(next);
}

function paginationPages(cur, total) {
  const delta = 2;
  const left  = cur - delta, right = cur + delta;
  const range = [], result = [];
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= left && i <= right)) range.push(i);
  }
  let prev;
  for (const i of range) {
    if (prev && i - prev > 1) result.push('…');
    result.push(i);
    prev = i;
  }
  return result;
}

function pageBtn(label, disabled, onClick) {
  const btn = document.createElement('button');
  btn.className = 'page-btn';
  btn.textContent = label;
  btn.disabled = disabled;
  if (!disabled) btn.addEventListener('click', onClick);
  return btn;
}

// ── Active pills ───────────────────────────────────────────────────────────
function renderPills() {
  $pills.innerHTML = '';
  const add = (label, clear) => {
    const pill = document.createElement('span');
    pill.className = 'filter-pill';
    pill.innerHTML = `${escHtml(label)} <span class="pill-x">✕</span>`;
    pill.addEventListener('click', () => { clear(); fetchAnime(); });
    $pills.appendChild(pill);
  };
  
  if (state.q) add(`"${state.q}"`, () => { state.q = ''; $search.value = ''; });
  if (state.type) add(capitalise(state.type), () => { state.type = ''; resetDropItem('typeMenu'); document.getElementById('typeToggle').innerHTML='<i class="bi bi-collection-play"></i> Type'; });
  if (state.status) add(capitalise(state.status), () => { state.status = ''; resetDropItem('statusMenu'); document.getElementById('statusToggle').innerHTML='<i class="bi bi-broadcast"></i> Status'; });
  
  state.genresIn.forEach(g => add(`+ ${g}`, () => {
    state.genresIn = state.genresIn.filter(x => x !== g);
    $genreCount.textContent = (state.genresIn.length + state.genresEx.length) || ''; buildGenreMenu();
  }));
  state.genresEx.forEach(g => add(`- ${g}`, () => {
    state.genresEx = state.genresEx.filter(x => x !== g);
    $genreCount.textContent = (state.genresIn.length + state.genresEx.length) || ''; buildGenreMenu();
  }));
  state.years.forEach(y => add(y, () => {
    state.years = state.years.filter(x => x !== y);
    $yearCount.textContent = state.years.length ? `(${state.years.length})` : ''; buildYearMenu();
  }));
}

function resetDropItem(menuId) {
  document.querySelectorAll(`#${menuId} .dropdown-item`).forEach(i => i.classList.remove('active-item'));
  document.querySelector(`#${menuId} .dropdown-item[data-value=""]`)?.classList.add('active-item');
}

// ── Skeletons ──────────────────────────────────────────────────────────────
function renderSkeletons() {
  $grid.innerHTML = '';
  $empty.style.display = 'none';
  for (let i = 0; i < state.perPage; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton';
    s.innerHTML = `<div class="skeleton-img skeleton"></div>
      <div class="skeleton-text skeleton" style="width:80%"></div>
      <div class="skeleton-text skeleton short"></div>`;
    $grid.appendChild(s);
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showEmpty() { $grid.innerHTML = ''; $empty.style.display = ''; $pagination.innerHTML = ''; }
function showError(err) {
  $grid.innerHTML = `<div class="col-12 text-center py-5 text-danger"><i class="bi bi-exclamation-triangle fs-1"></i><br/><small>${escHtml(String(err))}</small></div>`;
}
function capitalise(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : ''; }
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getStatusIcon(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s === 'releasing' || s === 'currently airing') {
    return '<i class="bi bi-broadcast" style="color: #4ade80; margin-right: 5px;" title="Currently Airing"></i>';
  }
  if (s === 'not_yet_released' || s === 'not yet aired') {
    return '<i class="bi bi-clock-history" style="color: #facc15; margin-right: 5px;" title="Not Yet Aired"></i>';
  }
  return '';
}
</script>

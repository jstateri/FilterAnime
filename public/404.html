<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .not-found-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px;
    }
    .not-found-code {
      font-family: var(--font-head);
      font-size: 8rem;
      letter-spacing: .05em;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
    }
    .not-found-title {
      font-family: var(--font-head);
      font-size: 2.5rem;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }
    .not-found-message {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
      max-width: 500px;
    }
    .not-found-btn {
      background: var(--accent);
      color: #121212;
      border: none;
      padding: 12px 24px;
      font-weight: 700;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .not-found-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(187, 134, 252, 0.3);
      color: #121212;
    }
  </style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────── -->
<div id="topbar" class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
  <div class="d-flex align-items-center gap-3 flex-wrap">
    <h1><a href="/" style="text-decoration:none; color:inherit;">BROWSER</a></h1>
    <span class="count-badge">404</span>
  </div>

  <div class="d-flex align-items-center gap-2 flex-wrap">
    <a href="/schedule.html" class="stats-link" style="margin-right:8px;">
      <i class="bi bi-calendar3"></i> Schedule
    </a>
    <a href="/recs.html" class="stats-link" style="margin-right:8px;">
      <i class="bi bi-stars"></i> Recommendations
    </a>
    <a href="/stats.html" class="stats-link" style="margin-right:8px;">
      <i class="bi bi-bar-chart-fill"></i> My Stats
    </a>
    <a href="/" class="stats-link">
      <i class="bi bi-house-door-fill"></i> Home
    </a>
  </div>
</div>

<div class="not-found-container">
  <div class="not-found-code">404</div>
  <h2 class="not-found-title">Looks like you're lost in another world</h2>
  <p class="not-found-message">The anime or page you are looking for does not exist, has been removed, or is temporarily unavailable.</p>
  <a href="/" class="not-found-btn"><i class="bi bi-house-door-fill me-2"></i>Return Home</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Schedule - Anime Tracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/notifications.css" />
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────── -->
<div id="topbar" class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
  <div class="d-flex align-items-center gap-3 flex-wrap">
    <h1><a href="/" style="text-decoration:none; color:inherit;">BROWSER</a></h1>
    <span class="count-badge">Weekly Schedule</span>
  </div>

  <div class="d-flex align-items-center gap-2 flex-wrap">
    <a href="/schedule.html" class="stats-link" style="margin-right:8px; color:var(--accent);">
      <i class="bi bi-calendar3"></i> Schedule
    </a>
    <a href="/recs.html" class="stats-link" style="margin-right:8px;">
      <i class="bi bi-stars"></i> Recommendations
    </a>
    <a href="/stats.html" class="stats-link" style="margin-right:8px;">
      <i class="bi bi-bar-chart-fill"></i> My Stats
    </a>
    <a href="/" class="stats-link">
      <i class="bi bi-house-door-fill"></i> Home
    </a>
  </div>
</div>

<!-- ── Main Grid ───────────────────────────────────────────────────────── -->
<div id="main" style="padding-top: 20px;">
  <div id="scheduleControls" class="d-flex justify-content-end mb-3" style="padding: 0 16px;">
    <div class="form-check form-switch" style="display:flex; align-items:center; height:38px; padding-left: 2.5em; margin:0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding-right: 16px;">
      <input class="form-check-input" type="checkbox" role="switch" id="myListOnlyToggle" style="margin-top:0;">
      <label class="form-check-label ms-2" for="myListOnlyToggle" style="color:var(--text);font-size:.9rem;cursor:pointer;white-space:nowrap;font-weight:600;">
        My List Only
      </label>
    </div>
  </div>

  <div id="scheduleGrid" class="schedule-grid">
    <!-- Days will be injected here by schedule.js -->
  </div>
  
  <div id="emptyState" style="display:none; text-align:center; padding: 40px;">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem; color: var(--accent) !important;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <h4 class="mt-3" style="color:var(--muted)">Loading Schedule...</h4>
  </div>
</div>

<!-- ── Detail modal ────────────────────────────────────────────────────── -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <button id="modalBackBtn" class="btn btn-sm btn-outline-secondary" style="display:none; align-items:center; gap:5px; padding: 4px 10px; border-color: var(--border); color: var(--text);">
          <i class="bi bi-arrow-left"></i> Back
        </button>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- App entry point -->
<script type="module">
  import { initSchedule } from '/js/schedule.js';
  document.addEventListener('DOMContentLoaded', initSchedule);
</script>

</body>
</html>
